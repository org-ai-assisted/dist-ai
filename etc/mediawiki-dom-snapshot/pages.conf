## Page list for mediawiki-dom-snapshot.
##
## One title per line. Lines starting with '#' and blank lines are
## ignored. Titles are URL-quoted by the snapshot tool, so spaces
## become underscores and slashes are preserved (subpages).
##
## Pages are picked for representative coverage:
##   - The Kicksecure custom-CSS pages currently driven by
##     {{#css:/src-copy/...}} in the wiki page source.
##   - High-traffic landing pages whose layout is load-bearing.
##   - Special pages (chrome / login-state-dependent rendering).
##   - Templates that influence many pages indirectly.

