## --- Edit-form coverage ---
## The action=edit FORM is a distinct render path from a page view, and is
## where the "skincss bundle leaks onto edit pages" regression surfaced (the
## custom skin must load on /wiki/ views only, never on action=edit). This file
## only lists titles; to actually capture the edit form the RUNNER must include
## the 'edit' intent in CAPTURE_MODES (e.g. anon-first-desktop-light-edit-
## chromium, or the default CAPTURE_MODES=all). A view-only run -- as an earlier
## prod-vs-stage runner used -- never exercises it. The clean signal there is the
## ASSET diff (a stray mw-combined-skincss <link>), since the phash is confounded
## by prod's per-page edit protections (View-source vs Editing).

## --- Sitenotice edge-case page ---
## TestpageForFlyInNotification is named in Template:Sitenotice_id as
## the one page where the template returns 'end-of-year' regardless
## of the current month (the December branch). It exercises the
## sitenotice id branch that the hardcoded year-round id (38) in
## private/mw-headscript-content.php does NOT match -- the end-of-year
## banner rendered on this page is hidden by the catch-all rule. A
## DOM diff against the production baseline pre-retirement makes the
## trade-off observable.
TestpageForFlyInNotification

